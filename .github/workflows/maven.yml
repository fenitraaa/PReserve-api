# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Unit Test
      run: mvn test
    
    - name: Build with Maven
      run: mvn -B package -DskipTests
    
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/preserve:latest .
        docker tag ghcr.io/${{ github.repository_owner }}/preserve:latest \
                   ghcr.io/${{ github.repository_owner }}/preserve:${{ github.sha }}

    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/preserve:latest
        docker push ghcr.io/${{ github.repository_owner }}/preserve:${{ github.sha }}
